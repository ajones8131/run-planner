# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/runplanner}
spring.datasource.username=${DB_USERNAME:runplanner}
spring.datasource.password=${DB_PASSWORD:runplanner}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
# Dev default — REPLACE with a securely generated key in production
jwt.secret=dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLUhTMjU2
jwt.access-token-expiry-seconds=3600
jwt.refresh-token-expiry-days=30
